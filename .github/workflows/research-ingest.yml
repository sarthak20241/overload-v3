name: Research Ingest

# Phase 3 daily research ingestion. Pulls new papers from Europe PMC (and
# later bioRxiv / SportRxiv), distills them via Haiku 4.5, embeds with
# Voyage 3, and lands them in research_kb_pending for manual review.
#
# Schedule: 3am UTC daily (~8:30am IST). Output lands in research_kb_pending
# where the admin dashboard surfaces it for review.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   ANTHROPIC_API_KEY          — claude.com console → API keys
#   VOYAGE_API_KEY             — voyageai.com → dashboard → API keys
#   SUPABASE_URL               — https://rjmmslierxhvwdjgjilb.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  — Supabase dash → Settings → API → secret key
#
# Manual trigger: Actions tab → Research Ingest → Run workflow.

on:
  schedule:
    # 3am UTC — quietest time on Anthropic / Voyage, lands before morning IST
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_papers:
        description: 'Total papers budget for this run (split across topic plan)'
        required: false
        default: '20'
      skip_topic_plan:
        description: 'Skip the topic-driven plan and use the broad query only'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      review_age_hours:
        description: 'Min hours a pending paper must age before agent acts (24 = production, 0 = test mode)'
        required: false
        default: '24'

# Don't let two runs overlap — they'd race on checkpoint updates and the
# Voyage rate limiter doesn't share state across processes. cancel-in-
# progress:false means a second trigger queues rather than killing the
# already-running cron.
concurrency:
  group: research-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Hard cap. A 20-paper run takes ~8 min under Voyage's 3 RPM free tier;
    # 30 min leaves headroom for retries and Haiku queue blips.
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use npm ci against the committed lockfile for reproducible installs.
        # tsx is a transitive dep (we invoke via `npx tsx` below) so no
        # separate install needed.
        run: npm ci

      - name: Run ingestion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional: bumps PubMed/Europe PMC rate cap from 3 → 10 req/s
          PUBMED_CONTACT_EMAIL: ${{ secrets.PUBMED_CONTACT_EMAIL }}
          # Optional: 100 req/5min unauth, 5k/day with key. Trust v2 falls
          # back to the unauth path if missing.
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          MAX_PAPERS: ${{ github.event.inputs.max_papers || '20' }}
          SKIP_TOPIC_PLAN: ${{ github.event.inputs.skip_topic_plan || 'false' }}
        run: |
          set -eo pipefail
          ARGS="--max-papers=${MAX_PAPERS}"
          if [ "${SKIP_TOPIC_PLAN}" = "true" ]; then
            ARGS="${ARGS} --skip-topic-plan"
          fi
          echo "▶ Running ingest: npx tsx tools/research-ingest/run.ts ${ARGS}"
          npx tsx tools/research-ingest/run.ts ${ARGS}

      - name: Run agent auto-review
        # Second pass: walk every pending row that's been waiting ≥ 24h and
        # let the Sonnet review agent make the final call. The agent runs
        # AFTER ingestion in the same job because:
        #   - Same secrets / runtime → no separate workflow overhead.
        #   - Lets the same cron tick handle "yesterday's intake" review.
        # The agent will skip any row that already has a live agent_review_log
        # entry — re-running the cron is safe and idempotent.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # VOYAGE_API_KEY is required because env.ts's startup check is
          # mode-blind. The review path itself never calls Voyage (no
          # embedding work), but assertRequiredEnv() will exit-1 without it.
          # Cheaper to pass the secret here than to make the env check
          # mode-aware right now.
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REVIEW_AGE_HOURS: ${{ github.event.inputs.review_age_hours || '24' }}
        # `if: always()` would also re-run on failure of ingest — we want
        # that because review is independent of whether the new fetch
        # succeeded. The pending queue should still get processed.
        if: always()
        run: |
          set -eo pipefail
          ARGS="--review --review-age-hours=${REVIEW_AGE_HOURS}"
          echo "▶ Running auto-review: npx tsx tools/research-ingest/run.ts ${ARGS}"
          npx tsx tools/research-ingest/run.ts ${ARGS}

      - name: Summarize checkpoint state
        # Always runs, even on ingestion failure. Prints the per-source
        # checkpoint snapshot so we can see "did the cron actually advance
        # the watermark?" without opening the Supabase dashboard.
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo ""
          echo "═════ Checkpoint state after run ═════"
          curl -s "${SUPABASE_URL}/rest/v1/ingest_checkpoints?select=source,last_pub_date,papers_fetched,papers_added,last_run_at,last_error" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | jq '.'
          echo ""
          echo "═════ Pending queue size ═════"
          curl -s "${SUPABASE_URL}/rest/v1/research_kb_pending?select=count&review_status=eq.pending" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Prefer: count=exact" \
            -I 2>/dev/null | grep -i content-range || echo "(query failed)"
