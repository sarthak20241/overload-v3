name: Claude Code

# Lets you put Claude to work directly from GitHub. Mention @claude in an
# issue, a pull request, or any comment and Claude will pick up the context,
# work the task on a branch, and open/update a PR.
#
# Triggers:
#   - New issue whose title or body contains @claude
#   - Issue assigned (assign the issue, then comment @claude to kick it off)
#   - Any issue / PR / review comment containing @claude
#
# Required repository secret (Settings → Secrets and variables → Actions):
#
#   ANTHROPIC_API_KEY  — claude.com console → API keys
#
# You must also install the Claude GitHub app on this repo:
#   https://github.com/apps/claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when @claude is actually mentioned, so unrelated issue/PR
    # activity doesn't burn Action minutes or API credits.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
