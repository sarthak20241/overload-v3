name: Claude Mention

# On-demand Claude: type "@claude ..." in an issue comment or a PR review
# comment and Claude responds / makes the requested change. This is the flow the
# official Claude GitHub App is for. Install it once at:
#   https://github.com/apps/claude   (Configure -> pick this repo)
#
# PUBLIC-REPO GUARD: only @claude mentions from the OWNER / MEMBER / COLLABORATOR
# are honored, so strangers can't trigger paid runs by commenting "@claude".
# New-issue handling is already covered by claude-resolve-issue.yml, so this
# workflow deliberately listens only to COMMENTS, not issue creation.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
      ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No `prompt:` => mention mode. The action looks for the trigger phrase
      # (default "@claude") in the comment and acts on the request in context.
      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 40
