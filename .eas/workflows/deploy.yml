name: Deploy to app stores

# Builds a production binary for each platform and submits it to the stores
# whenever main is updated (i.e. a PR is merged). Can also be run on demand
# from the EAS dashboard via the manual trigger.
#
# Paths filter: backend and docs changes don't alter the app binary, so they
# shouldn't burn a build + store-submission cycle. Everything else triggers.
# TEMPORARILY PAUSED (2026-07-04): the push trigger is disabled while the
# set-types, diet, and holistic feature branches merge into main one after
# another. Re-enable it after the last merge, then run one manual dispatch.
on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - '**'
  #     - '!supabase/**'        # DB migrations + edge functions deploy separately
  #     - '!.planning/**'
  #     - '!.github/**'
  #     - '!.claude/**'
  #     - '!.eas/**'            # editing workflows shouldn't rebuild the app
  #     - '!store-assets/**'
  #     - '!sketches/**'
  #     - '!**/*.md'
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit to TestFlight
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  submit_android:
    name: Submit to Play Store (internal testing)
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
