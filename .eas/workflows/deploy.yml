name: Deploy to app stores

# Builds a production binary for each platform and submits it to the stores
# whenever main is updated (i.e. a PR is merged). Can also be run on demand
# from the EAS dashboard via the manual trigger.
#
# Paths filter: backend and docs changes don't alter the app binary, so they
# shouldn't burn a build + store-submission cycle. Everything else triggers.
on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!supabase/**'        # DB migrations + edge functions deploy separately
      - '!.planning/**'
      - '!.github/**'
      - '!.claude/**'
      - '!.eas/**'            # editing workflows shouldn't rebuild the app
      - '!store-assets/**'
      - '!sketches/**'
      - '!**/*.md'
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit to TestFlight
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  # Android Play Store submission is PAUSED. Since the health-tracking feature
  # (Health Connect / HealthKit) shipped, Google Play rejects every API
  # submission with "You must let us know whether your app includes any health
  # features" until the Health apps declaration (App content -> Health) is
  # completed in the Play Console. That is a manual, legal-attestation form.
  # The Android build above still runs, so a signed AAB is ready to upload
  # manually. Re-enable this job once the declaration is filled in.
