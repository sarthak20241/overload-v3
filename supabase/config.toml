# Supabase project config — checked into source so deploys are reproducible.
# Generated by `supabase init`-style defaults plus per-function overrides.

[functions]
# Defaults apply to every function unless overridden in a [functions.<name>]
# block. We do not set verify_jwt at the top level — we override per function
# below — but importing-map and JS runtime defaults flow from here.

# ── Per-function overrides ──────────────────────────────────────────────────
#
# Why verify_jwt = false on Clerk-fronted functions:
#
# Supabase's third-party auth integration registers Clerk as a JWT issuer for
# PostgREST and Realtime, but NOT for the Edge Functions gateway. With the
# default `verify_jwt = true`, the gateway only accepts JWTs signed by the
# project HMAC secret and rejects valid Clerk JWTs at the network layer —
# function code never executes, every call returns 401.
#
# Both functions below verify the Clerk JWT themselves (jose + Clerk JWKS) at
# the top of the handler. That's stricter than the gateway's check anyway
# (issuer-pinned), and it lets us extract the Clerk subject into a `userId`
# variable for RLS-bound RPCs and admin-client writes.
#
# Until Supabase extends third-party auth to Edge Functions, this is the
# correct configuration for this project. Do NOT flip these to true.

[functions.ai-coach]
verify_jwt = false

[functions.delete-account]
verify_jwt = false
